{% extends 'gestion/base.html' %}
{% block content %}
    <h2>Clientes</h2>
    <a href="{% url 'cliente_create' %}" class="btn btn-primary">+ Nuevo Cliente</a>
    <br><br>
    <table>
        <tr>
            <th>Nombre</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>
        {% for cliente in clientes %}
        <tr>
            <td>{{ cliente.nombre }}</td>
            <td>{{ cliente.email }}</td>
            <td>{{ cliente.telefono }}</td>
            <td>
                <a href="{% url 'cliente_update' cliente.pk %}">✏️ Editar</a> |
                <a href="{% url 'cliente_delete' cliente.pk %}">🗑️ Eliminar</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="4">No hay clientes registrados.</td></tr>
        {% endfor %}
    </table>
{% endblock %}
